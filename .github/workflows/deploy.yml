name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: 18

jobs:
  # ============================================================================
  # TEST & LINT
  # ============================================================================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: npm run lint --workspace=api || true

      - name: Lint Frontend
        run: npm run lint --workspace=frontend || true

  # ============================================================================
  # BUILD & DEPLOY
  # ============================================================================
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ========== BUILD API (Hono/Workers) ==========
      - name: Build API
        run: npm run build:api
        env:
          NODE_ENV: production

      # ========== BUILD FRONTEND (Next.js) ==========
      - name: Build Frontend
        run: npm run build:frontend
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # ========== DEPLOY TO CLOUDFLARE WORKERS ==========
      - name: Deploy API to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./api
          environment: production
          secrets: |
            JWT_SECRET
            SMTP2GO_API_KEY
            SMTP_FROM_EMAIL
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP2GO_API_KEY: ${{ secrets.SMTP2GO_API_KEY }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}

      # ========== DEPLOY TO CLOUDFLARE PAGES ==========
      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: maintenance-scheduler
          directory: frontend/out
          productionBranch: main

      # ========== SETUP D1 MIGRATIONS ==========
      - name: Run D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./api
          command: d1 execute maintenance-scheduler --file=../../migrations/001_init.sql

      # ========== NOTIFY DEPLOYMENT ==========
      - name: Deployment Success
        if: success()
        run: |
          echo "✅ API deployed to Cloudflare Workers"
          echo "✅ Frontend deployed to Cloudflare Pages"
          echo "✅ Database migrations completed"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above."
          exit 1

  # ============================================================================
  # PREVIEW DEPLOYMENT (on PRs and develop branch)
  # ============================================================================
  preview:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build:api
        env:
          NODE_ENV: development

      - name: Build Frontend
        run: npm run build:frontend
        env:
          NODE_ENV: development
          NEXT_PUBLIC_API_URL: ${{ secrets.PREVIEW_API_URL }}

      - name: Deploy to Cloudflare Pages Preview
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: maintenance-scheduler
          directory: frontend/out
          productionBranch: main

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed! Check it out at: https://maintenance-scheduler.pages.dev`
            })
